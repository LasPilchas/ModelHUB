<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Cults 3D</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Mini Cults 3D</h1>

  <div class="gallery">
    <div class="model-card">
      <img src="assets/thumb1.png" alt="Modelo 1" onclick="showModel('models/model1.glb')">
      <p>Modelo 1</p>
    </div>
    <div class="model-card">
      <img src="assets/thumb2.png" alt="Modelo 2" onclick="showModel('models/model2.glb')">
      <p>Modelo 2</p>
    </div>
    <div class="model-card">
      <img src="assets/thumb3.png" alt="Modelo 3" onclick="showModel('models/model3.glb')">
      <p>Modelo 3</p>
    </div>
  </div>

  <div class="viewer-container">
    <model-viewer id="viewer" src="" alt="Modelo 3D" auto-rotate camera-controls style="width:80%; max-width:800px; height:500px;"></model-viewer>
  </div>

  <script src="main.js"></script>
</body>
</html>
